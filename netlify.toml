[build]
  publish = ".output/public"
  command = "pnpm run generate"

[[redirects]]
  from    = "https://coruscating-blini-0b4753.netlify.app/*"
  to      = "https://azzamazizali.sy/:splat"
  status  = 301
  force   = true

[[redirects]]
  from   = "http://azzamazizali.sy/*"
  to     = "https://azzamazizali.sy/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.azzamazizali.sy/*"
  to     = "https://azzamazizali.sy/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://www.azzamazizali.sy/*"
  to     = "https://azzamazizali.sy/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "DENY"
    X-Content-Type-Options       = "nosniff"
    X-XSS-Protection             = "1; mode=block"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
